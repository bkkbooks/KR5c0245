body:
  text: 混俗頣生錄序臨九天地之間以人爲貴言貴者異於萬物也人之所重者榮顯所寶者性命自天地精粹以生形寒暑燥濕以生困合順而守之順則瘵癘不作逆則萬瘥輻湊雖大限而不能續中間夭枉沈痼跛眇之疾良由攝理乖方之致然夫駢拇枝指附贅懸疣此乃生常之患非關謂息之誤矣是以五色亂目五音聾耳五味爽口畋獵狂心四事去之塵外之人也凡居深山處窮谷與猿猱為侣逐麋鹿爲群棄寰中之美樂食炁餐霞保壽齊於天地者萬萬人中未有一二哉稍能於飲食嗜慾間消息之則無枉橫之虞也詞昔年五味酒食過度痼疾纏身思其所因有自來矣遂即棲心附道肆志林泉景慮都忘漸至痊復詞禀性頑愚昧於忌犯將攝之理粗約覊縻僅二十年来頗獲其驗且夫脩短窮通人之定分不能保存和氣而乃騰倒精神加出鍜鑄金砂資助情慾棄其仁義冀信楨祥妄圖永遠此其大惑歟謂皮之不能存毛將安附至於脫屣沖虚駕龍控鶴者此乃世世施隂德生生履仁義又有兀兀之性所禀竪固非藥餌之所致古人有壽數百嵗者不聞有學道求仙之術龜龍蛇鶴亦無服食茹芝之方松筠經霜而不凋蔓草先秋而揺落此物之自然性也豈天地大道私於彼人物哉是鳥獸非彈射不死蓋以自適之性飢啄渇飲嗜慾以時而無所縈人多夭傷疾病以貪求名利追琢其神强服藥餌加以嗜慾無時昧於忌犯服翫奢侈飲食過度輙恣飽暖且夫土木泉石莫非造化所成者則負瑰奇詭怪之狀而人亦然况利禄榮顯暫時間耳蓋非干身之事帷攝生養性則神謐延齡而已今輙具消息樞要十章題目曰混俗順生錄此皆歷試有驗非乃謬言雖不能究習研精而乃梗槩略備不能盡文直書其事倘遇同道覧之冀微採綴云爾
