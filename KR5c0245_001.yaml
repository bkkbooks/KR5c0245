front:
  text: 混俗頤生録卷上下同卷
  hash: sha256:738887fbd876fb6952f99911af6949837a231e7a3be89127a9411533ed643021
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0245_HFL_001-001a, image: hfl/0573/0573-118.png}
body:
  text: 茅山處士劉詞集飮食消息第一食為命之基不可斯須去之也既乖節儉或昧寒溫瘵癘之由自此始矣既不能服餌丹霞出納元氣則於飲食嗜欲行住坐卧間消息之以此冀為良藥而日用不知其為尚矣夫人當以飲食先喫暖物後喫冷物為妙何者以腎藏屬水水性常冷故以暖物先暖之不問四時常此消息彌佳就中夏月偏宜暖之為伏隂在內耳食不欲苦飽苦飽即傷心傷心即氣短妨悶食了先以手摩肚數十下兼仰面呵氣二十下甚消毒食食了不欲便睡卧即令患肺氣榮衛不通血脈凝滯之使然也肢節煩重尤多嗜睡百疾從此而生矣食了必須沖融少時行三五十步使食消化心腑空懸乃可寢卧寢卧之時不欲言語歌嘯五藏如鐘磬不扣不發其聲此將息之妙矣夫飲食所以助氣食飽氣不行食了尤忌仰卧多成氣痞兼頭風食不欲粗及速速即損氣粗即損脾脾損即為食勞男子五勞此為一勞之數也食飽不欲速步走馬登髙涉嶮必傷內室不欲夜食日沒之後脾當不磨為音響斷絶故也脾好音樂絲竹才聞脾磨即周禮云樂以侑食是以音響皆主於脾若腹內稍冷食即不消兼亦損胃胃損則翻翻即不受榖氣既不受穀氣即多吐吐即轉為翻胃之疾夜後不宜飽食肉面生膾夏月夜短尤宜忌之生鱠不可與乳酪同食此等之物夜後雖消甚損脾胃令人脾勞向夜勿飽食煎餅尤當大損風氣之人偏不宜食食熱物後不以冷水漱口食冷物後不以熱水漱口冷熱相擊是以多患牙齒疼痛齒根宣露凡喫炙肉若乘熱食之多患風疳𧈟齒或黃黯漸至缺落亦令血脈不行人若飽食後宜立小便飢即蹲小便最為妙恐損膀胱故也膩多之物甚不宜人暗眼兼腸胃冷滑尤多動風若患風疳氣疾故宜忌之五味稍薄令人神爽唯腎氣偏宜鹹物兼消宿食諸並不冝食若偏多則隨其藏腑必有所損是以醎多傷筋固不可嗜甘傷胃辛傷目苦傷心驚傷魂憂傷神思傷意恣傷情恨傷志久視傷眀久聽傷聰久行傷筋久卧傷血久勞傷骨久立傷肢節久語傷氣大渴不大飮大飢不大飽大樂不大憂大勞不大息欲大得不欲大失是以怒傷正氣也大勞力乏絶大飢損臟腑大飽腠理閉大渴經脈蹶兼氣不行大醉神散越大笑氣飛揚大恐心恍惚大熱氣不通大寒血脈結多睡神魂離大驚心不安此皆為損壽之候凡人常忌雞豬自死牛肉陳臭難消鹹醋粘滑冷膩生蔥大小蒜生香菜不時之物瓜果粉粥冷淘等物非養生攝理之道凡服藥餌之時尤忌三般受氣不足之肉肉者難豬無鱗魚又忌三般受飛不足之菜菜者莙達萵苣波薐閉血觸故也夫人若不能常於行住坐卧及飮食嗜欲間消息之縱服靈芝日飲沆瀣豈有補益乎但助陽之藥固持盈滿日久月深必獲大損其何昧哉若喫肉萊間有筋韌勿咽之此難消之物經時多為癥癖亦令脾勞又不可於星月及神廟宫觀名山大川古壇神樹墟墓之間飲食况為道家所禁深宜戒之飮酒消息第二酒應星宿其來遠矣智者飲之則智愚人飲之則愚消憂暢志發怒宣言皆由斯物是以先王飲之以禮樂賢人飮之陶情性常人飮之逞荒欲唯酒無量之謂也豢豕為酒非為禍也是以飲酒不欲過多兼頻大醉極傷心神肝浮膽橫又復招風敗腎毀筋腐骨莫過於酒飽食之後尤宜忌之夫好酒人多患肺氣兼風不爾則腰膝沉重或膀胱冷疼課一般耳凡飲後不欲大吐大吐則肝翻贍竭肝是膽之府既竭則膽痿膽痿則心怯心怯則多驚悸夜卧恍惚尤多健忘則心神漸散覺損則服補心凡欲飮酒不欲速速則衝破肺肺為五臟之華蓋固不得損損即多涕洟兼患肺氣肺痿咳嗽之疾若患勞氣風疳五痔人切須忌之若患風人加之藥物浸酒不令甚醉飮酒後不欲得飲冷水冷茶多為酒引入腎藏為停毒水即須去之多時必腰膝沈重膀胱冷疼兼患水腫消渴攣躄之疾皆由斯起飮後不欲一向卧須使人回轉不爾浸捐膀胱腸胃但看酒家屋易壞此益眀矣不問四時常喫暖酒彌佳若冬月但殺冷而已不要苦熱熱即傷心肺凡是飮食皆不欲熟喫非獨熱耳夏月炒黑豆乘熱投酒中浸候其色紫微暖飮之理氣無比秋冬間即量其自性冷熱所患以藥物浸酒飲之甚佳今人多以蒲萄麵麥為之是巧偽亂真非其療病固不可以諸物雜之古人玄酒大羹尚其質朴夫酒少喫即益多喫即損少即引氣導藥力潤肌膚益顔色通榮衛理氣禦霜辟溫氣凡空腹切不宜聞穢惡之物氣及往疾病人家但飮酒即辟邪毒昔有三人晨朝冒露而出一人飽食一人空心一人飲酒空心者卒飽食者病飮酒者健酒至益人過即損人況酒為腐腸之物固不可濫觸酒性至熱大寒凝海唯酒不凍凡造酒欲發皆候風潮而動則和合其隂陽造化之功也所以飲多則冷凡丈夫陽氣多弱兼飮後恣遊或扇風取涼固當虛損後復為酒引隂氣結固下焦又或未醒大渴遂喫茶飲水即為酒引入腰膝貯在膀胱為停毒水腫結固下焦若非名藥良醫不能行逐是以多飮即冷耳常見人夏月於井中浸酒冬月即以酥酪和飲之此為大害必當入腳膝間為冷癥之疾酥酪入酒發勞疰動痼疾必不可遣酒所以醉人麴蘖之故也麴蘖氣消則皆為水當凝入腰膝間無因更出飮酒不欲風裏坐卧袒肉操扇蓋緣毛孔悉開不欲使風入風入即令四肢不遂兼風手足癱瘼等皆由斯得凡甘肴美膳乘涼飮冷雖乃一時適意久久皆為患害春時消息第三人稟隂陽五行四時肅殺之氣差若毫髮瘵癘則生是以首足象天地血脈象江河毛髮象草木嗔怒象雷電兩目狀日月嗜欲稟生植氣候小差人多疾疫既反其令瘵癘則生細而察之萬不失一凡春中宜發汗吐利針灸宜服續命湯薯藥九甚妙自冬至後夜半一陽生陽氣吐隂氣納心膈宿熱陽氣相衝若兩虎相逢狹道必鬪矣春夏之交遂使傷寒虛熱時行之患良由冬月附火及食熱物心膈宿痰流入四肢之故也其患者不啻十有六七二月巳來採取東引桃枝并葉各一握水三升煎取二升巳來早朝空心服之亦不必全盡但吐却心膈痰飮即不為害能四時依此吐殊勝瀉瀉即令人下焦虛冷吐即去心腑客熱除百病小兒即與茵陳丸犀角丸瀉之以小兒未經人事即不畏瀉亦須審其冷熱虛實不得浪為若是男子事須下瀉除腳氣衝心膀胱冷疼痛膿水三焦不通即須瀉常得通暢不要苦瀉夏月尤忌瀉為泄隂氣故也丈夫四十巳上不宜苦瀉春深稍宜和平將息綿衣稍宜晚脫不可令背寒寒即傷肺令鼻塞咳嗽似熱即去之稍冷即加之甚妙肺俞五藏之表胃俞十二經脈之長最不可失寒熱之節俗諺云避風如避箭避色如避亂勤解逐時衣少餐申後飯欺言可寶耳覺虛熱食上常服紅雪時服柴胡湯三黃丸如玄參甚去虛熱兼治勞明目自春秋之際萬病發動之時固宜將攝矣夏時消息第四立夏三伏內腹中常冷特忌下利泄隂氣故也夏中不宜針灸唯宜發汗夏至後夜半一隂生唯宜服熱物兼喫補腎湯藥等非唯性熱之物亦常宜溫暖飯食况夏一季心王腎衰最宜補息盛熱時不宜喫冷淘麻飲粉粥蜜漿飽食後喫必起霍亂又生菜茄子緑腹中常冷食此凝滯難消之物多為癥魂若患冷氣風疾之人更須忌之夏耳不問老小常喫暖物至秋必不患赤白痢瘡疾霍亂但腹中常暖諸疾皆不能作為陽氣壯盛耳時人不能將攝日髙餐飯空腹喫茶緣腎納鹹被盬引茶入腎令人下焦虛冷手足疼痺飯食後喫三兩碗不妨似飢即不在喫限丈夫有痃癖五痔風疳冷氣勞瘦虛損女人有血氣頭風偏不宜茶所以消食滌昏煩空心啜之實僣濫盛熱時宜於隱處寢卧輒不得於星月下露地偃坐兼便睡著使人操扇風特宜忌之常見人養新生孩子畏熱睡著後多扇風羔於風涼之處卧此愛之甚然猶善養馬者以筐盛糞以蜄盛溺設蚊蚋即使人撲之以附之不時則驚蹙毁首辟胸此意有所至而愛有所亡可不慎歟以此孩子多患臍風手足攣掣口撮俗號猢猻噤不知其由又曰鬼魅可謂謬哉以此則之萬不失一夏月不宜晚起令人四肢昏沈精神慒昧勿冷水浴使人虛熱眼暗筋脈蹶逆霍亂轉筋常以飢沐飽浴以飢即不在浴限浴了避風小兒亦知之衝熱來勿以冷水洗手面及淋背犯之必患隂黃但潄口即可矣勿當操扇袒露多令人患刺風風疹亦勿飲冷水成癖氣結氣及水榖重下等痢生萊茄子瓜甚不宜人尤忌向夜食之唯粗人辛苦之士消殺得瓜雖理氣尤暗人服如驢馬食之即日眼爛不可不明矣食熱物汗出即拭却勿扇風殊佳勿夜食尤忌喫肉麵生冷粘膩之物為夏月夜短有年之人腹中常冷或不消化多患腹脹霍亂之疾勿當風卧濕緣常出汗體虛風拍著人多患風痺手足不遂言語謇澀四肢癱瘓偏風等雖不盡害亦有當時中者有不便中者逢年之盛遇月之滿得時之和即幸而獲免若遇年之弱值月之空失時之和無不中者昔有人代皆不壽來告彭祖祖遂周視其人寢卧之處果有一穴當其腦戶頭是三百六十諸陽之總會以賊風吹注陽氣散盡日月深久則斃矣祖使斂其穴其人果夀矣所謂懷仁抱義未見其益有時而用此乃喻將攝之謂也棄仁背信未見其損有時而亡此乃諭不能調護之故損益之道其理彰然夏月不欲數沐數沐則心覆令人健忘兼甚引風每晨梳頭一二百下仍不得梳頭皮兼於無風處梳之自然去風明目矣秋時消息第五立秋後稍宜和平將攝春秋之際故疾發動之時切須安養量其自性將理秋中不宜吐及發汗令人消爍藏腑不安唯宜針灸下利進湯散以助陽氣止若患積勞五痔消渴等病不宜喫乾飯灸煿自死牛肉生鱠雞豬濁酒陳臭鹹醋粘滑難消之物及生萊瓜果毒魚鱠鮓醬之類若風氣冷病痎癖之人亦不宜上件之物若自知夏月冷喫物稍多至秋患赤白痢兼瘧即宜以童子小便二升并大腹檳榔五顆和子細切煎取八合下生薑汁一合和臘雪三分或二分早朝空心分為兩服瀉三兩行夏月所食冷物及膀胱有宿水冷膿悉為此藥行逐即不為患耳此藥是乘氣湯藥縱年老之人亦宜服之且不奪氣力兼不虛人况秋利又當具時此湯理腳氣兼埋諸氣其方甚克效故附之於此丈夫瀉後三兩日以薤白粥加羊腎空心補之殊勝服諸捕藥每晨睡覺暝目叩齒三七下咽津以手掌相收令熱尉眼唯遍數多為妙此法去風明目無以加之混俗頤生録卷上
