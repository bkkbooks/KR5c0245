front:
  text: 混俗頤生録卷下
  hash: sha256:9c34d65db4d6e969375b08d5c9e3cab1d12767bdc9b83d8ec30a2c6d2e0b30be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0245_HFL_002-001a, image: hfl/0573/0573-140.png}
body:
  text: 茅山處士劉詞集冬時消息第六冬則伏陽生內有疾宜吐心膈多熱特忌發汗畏泄陽氣故也宜服浸酒補藥以迎陽氣寢卧之時消息稍宜虛歇大約如此若此宿疾須自酌量不得準此綿衣稍宜晚著仍漸漸加厚不得頓溫此乃將息之妙矣又不得令火氣擁聚但免寒即可以若遇大寒不得頻於火上烘灸尤甚損人手足皆應心多炙手遂引火氣使人心多燥熱所喫熱物及附火熱氣皆積在心頭心屬火故也夫冷藥不治熱極熱藥不治冷極水流濕火就燥故也凡服藥先看諸藏其有不足處置其所損則補之皆有效驗人之服藥多不相當為受性皆不同耳亦不用火灸衣服令暖著之亦甚損人春夏之交隂氣既入不能調護陽氣流入四肢遂致時行熱疾之作也甚者狂走妄語若便服冷藥十有二三縱活者亦不免攣躄喪眀髮落瘡疥等凡隂陽二毒傷寒是天行之別號只有療法即無可法七日內可療七日外不可療其驗若此藥之用豈宜差誤覺是此疾不等便服冷藥若是陽毒萬一得差若正隂毒服以冷藥手下狼狽深宜詳審不可參差每日一浴冀通血脈腠理通和每擬浴時盡飽食夜間即浴浴後即喫一兩盞酒使卧不得衝風且一宵安眠房事切忌他時所利每食後服好紅雪或服三黃丸更妙飲食之間四十巳上稍宜溫四十巳下稍宜寒若先有宿疾冷衾之中自審息不得準此凡冬月所蓋熱被氊褥等稍熱即減之凝寒即加之諺云服藥不如勤脫著誠哉斯言但是諸疾切忌食熱肉酒麵灸煿之物多食令人血脈不行饆饠餛飩平常之時亦不宜熱喫冬月若食熱物至春夏交必為療癘矣患勞消息第七丈夫患積勞五痔消渴下焦冷上膈多熱良由飲食嗜欲不節之故况丈夫四十巳來下焦先衰女人四十巳來上焦先衰抑聞勞疾本生於兩端不干藝重提輕兀兀終日即害唯是間散之人多有此疾况間散之人不多運動氣力飽食之後不多行步坐卧任性經脈不通血脈凝滯之使然也是以貴人貌樂而心勞賤人心間而貌苦貴人加以嗜欲無時昧於禁忌飽食珍羞便寢卧之因此致耳若引而伸之觸類而長夫人常須用力但不令勞倦貴勞衛通流血氣周遍猶若户樞終不朽腐此將攝之要訣萬金之所不言夫人初得勞氣之時其候甚多而日用不知略而條之細宜詳審其候者兩眼昏暗手足心熱背膊悶困項頸酸疼四肢無力兩頰及脣時有紅赤大小便赤澀腳手軟弱久立不得喫飯食不作肌膚常思異食喫即不多兩肋間痃癖氣脹腹中常冷食不消化膈上虛熱時時咳嗽唾涕稠粘多卧多起狀似佯病人或時壯熱畫可夜極骨節煩燥尤多健忘脣口焦乾巳上並是患勞之證候也覺有此候即須尋方服藥節儉嗜欲調息飲食即冀漸退若非自覺不遇良醫辨具狀候别為治療日月深久胸前骨出臂上肉銷咳嗽不出聲擡肩喘息痢如豉汁或似爛腸此乃五藏壞矣神慧之師所不能救歟若覺有此候不宜喫陳臭難消粘滑之物犬肉難豬野狐羊駝牛馬灸肉生冷等物兼節房中之事昔許由以一瓢之勤猶以為煩况書暮晨興馳逐名利加以情欲相牽運用心機自然神散形勞焉得不櫻疾瘵覺有此狀宜喫煮飯燒鹽薑豉汁為粥枸杞甘菊牛蒡韭薤地黃馬齒鯽魚白魚鹿肉乾脯白煮精羊肉並宜食之其餘禁斷平愈後任餐患風消息第八人患久風固難將息凡風疾之人髓竭肉踈則風入骨間故肢節不遂骨虛血薄之故也稽其由皆有所因或是夏月當風乘涼便至睡或酒後操扇取風好喫毒魚豬肉之使也况江淮地偏又多下濕夏月炎熱風氣鬱蒸多患此疾女人不多行步飽食之後坐卧任性尤多壅塞初得之時狀猶不定或睡中口內涎出手足戰掉或大腸偏澀或腳膝疼重或肢節不仁或常眼澀行坐睡著或筋脈攣掣或多鼽嚏嚏不可休皮膚乾癢面色浮青眼頰多瞤或咯痰唾吐至多頭旋目眩巳上並是中風之候且宜服此小飮子然後大湯藥却須緩治不宜急速緩則易差急即難痊上品之藥一百二十餘味性皆和厚漸痊疾瘵今之庸醫藥性不辦脈候兼荒不以智慮推之但求倉卒之效儻獲即目之驗病家乃為良醫且治病之法要須精脈候兼會五行用藥審其冷熱加以智慧慈憫為先不以貧富等差為意但務救濟一心如此醫人隂有神護用藥理病無不痊除夫病患之中有卒暴者須求手下之驗止如喉閉腳氣衝心隂陽毒傷寒急勞發背小兒急疳乳癰卒暴心腹痛即要求即目之驗諸患並須漸漸除之夫患風疾之人左右扶持之者必須細意調理飲食湯藥等食欲得頻不欲得飽飽即壅悶又不得飢飢即虛虛即風增極似飢即食欲飽即休若患經年服藥不得暫停偏宜藥酒湯散不日全可若信庸醫藥物乖理避忌兼多轉受虛邪即當益甚在虛寶之間細宜調息可不勉之風疾之人欲宜瘦兼不多食其疾即退若事餐啜喜見肥充疾即益甚宜細詳之病人不宜嗔怒飢飽衝胃寒熱勞役心力至樂苦憂鶩喜併集並不宜之患風人尤多虛虛又須補補即壅壅即令人頭旋心悶兼氣衝心常令通滑瀉多又虛虗亦令人頭旋目痃將息之間尤宜詳審凡服補藥若自通滑即不更要服泄利之藥風疾之人宜喫羊肉去脂血緣虛事須要喫則如法煮之羊食百草草本且無毒但除脂血以藥煮之則不發病矣煮羊腳法羊一腳以刀子劙開水浸洗去血兼割去脂加防風一兩石膏五兩桑根白皮二兩切和煮之不損肉味尤頗益人又夏中單用桑葉五十片不要諸藥桑葉是時收採曝乾以備冬月使用乾者加至八十葉如煮散肉亦隨多少酌量煮之患風人不宜喫喬麥菘萊熱饆饠餛飩油麻糊餅和脂㸇灸肉熱喫白湯餺飥生冷油肥雞豬犬肉鯉魚生鱠生蔥蒜空腹茶不可食之其餘消息酌量之此不可一一具述矣户內消息第九人生之大患嗜欲飲食萬病變通侵尅年齡皆由此蠶蝕是以道家所禁去其大甚不然杜絶所謂師也過商也不及言俱不得其中通之不及相去幾何若是先有宿疾有因食而療或有因欲而療損益於身而日用不知是以上士不惑牢固性命寡思慮而遠聲色節飮食而去奢侈中智之人尚未能去其太甚下智之人恣其情性不知禁忌貪色好財敗其元和之正氣遂使大約侵剋必其然歟加以形貌衰羸傴僂攣躄沈痼在身而不能差既乖攝養又無良醫一旦至是雖即甘膳美色置之於前豈能暫之顧何似樽節去就涓涓不倦暢志恱目而巳可不懿哉天地氛氤萬物化淳男女媾精萬物化生此人生調息性命之根本攝生之所由凡人謂之不稽實曰野哉夫一戲二十已前時復三十已前日復四十巳後月復五十巳後三月復六十巳後七月復道經云六十閉户者言人踈於學性巳損於未萌以此戒之猶多病患噫夫世人不能畜養元和之氣保惜形容妄服丹砂資助情欲奢忲則神魂不附於身茫茫失塗精魄俱喪兀然質朴旨趣都忘或有功未就或有姑未成生涯落然身嬰痼疾夜起不得枕席是依勞歷妻孥綿綴歲序良由不知道性貪徇庸情而巳哉觀夫世人母存者不啻其十八九父存者不啻其十一二以此準之則人多嗜欲所惑躓其性命誠可悲之矣禁忌消息第十凡隱戲之時忌天地晦暝日月薄蝕疾風甚雨雷電震怒四時八節弦望晦朔日月失度祥雲興現虹出星奔本命之辰魁罡之日六甲之日六丁甲子庚申子午卯酉巳上並是隂陽七曜失度之時或又神當辰上直之日隂氣盛而逼陽則陽不足陽氣盛而逼隂則隂不足隂盛陽弱或陽盛隂衰故生病之由耳又忌酒醉之後飮罷未醒飽食之後乍飢正實出入行來筋力疲乏喜怒未定女人月潮衝冒寒熱疾患未平適大小便來新沐浴後既訖大小便早朝及戌時犯畢便行驀走無情而強為巳上皆神氣昏亂心力不足或四體虛羸即腎藏怯弱六情不均萬病從兹而作矣己上特宜慎之又忌名山大川神樹廟宇宫觀古壇杜樹之處星辰曰月之處燈燭六畜之前不可會合犯之損壽子息蠢愚深宜戒慎又每年五月十六曰是又地交會之辰特忌會合主減算壽損陽道終身不復曽見犯者有驗大約五月是人蛻精神之月老者奪之少者加之宜晏居靜慮節嗜欲制和心志冀安用况夏月心旺腎哀腎化為水待秋乃凝冬始竪夏中最須保惜尤為要妙凡所遇年髙於身者不可犯生月大者猶不許况具年髙於隂倍於陽大損男手陽倍於隂亦損女人是以伯樂相馬之義耳又忌薄唇大鼻踈齒黃髮皮躁痼疾情性不和莎苗強硬聲雄肉澀肢體不膏性專妬忌生痣既多已上並不可犯之若諸藥術著在前他經頥攝之方此其大略混俗頥生録卷下
